services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: soulsupport-api
    restart: unless-stopped
    ports:
      - "5007:5007"
    env_file:
      - .env
    environment:
      PORT: 5007
    networks:
      - soulsupport-network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5007/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  soulsupport-network:
    driver: bridge
