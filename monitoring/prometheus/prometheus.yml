global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # Prometheus itself
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  # SoulSupport Backend (app + business metrics)
  - job_name: soulsupport-backend
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["soulsupport-api:5007"]
        labels:
          service: backend
